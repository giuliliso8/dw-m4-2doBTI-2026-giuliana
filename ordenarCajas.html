<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ordenar boxes</title>
    <style>
        .contenedor{
            position: relative;
            border: 2px dashed #333;
            width: 500px;
            height: 200px;
        }
        .box-1{
            position: absolute;
            background-color: red;
            width: 100px;
            height: 50px;
            text-align: center;
        }
        .box-2{
             position: absolute;
            background-color: orangered;
            top: 0;
            right: 0px;
            width: 100px;
            height: 50px;
            text-align: center;
        }
        .box-3{
            background-color: yellow;
            position: absolute;
            bottom: 0px;
            left: 0px;
            width: 100px;
            height: 50px;
            text-align: center;
        }
        .box-4{
            background-color:green;
             position: absolute;
            bottom: 0px;
            right: 0px;
            width: 100px;
            height: 50px;
            text-align: center;
        }
        .box-5{
            background-color:rgb(19, 166, 235);
             position: absolute;
            bottom: 0px;
            top: 80px;
            left: 200px;
            width: 100px;
            height: 50px;
            text-align: center;
        }
        
    </style>
</head>

<body>
    <div class="contenedor"> 
        <div class="box-1">1</div>
        <div class="box-2">2</div>
        <div class="box-3">3</div>
        <div class="box-4">4</div>
        <div class="box-5">5</div>
    </div>
</body>

</html>
